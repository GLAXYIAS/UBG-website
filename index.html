<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Null_X - Unblocked Games</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <div class="dashboard">
    
    <!-- Left Sidebar -->
    <aside class="left-nav">
      <div class="logo">Null_X</div>
      <nav>
        <a href="#" class="nav-item active">Home</a>
        <a href="#" class="nav-item">All Games</a>
        <a href="#" class="nav-item">Trending</a>
        <a href="#" class="nav-item">Favorites</a>
        <a href="#" class="nav-item">Categories</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="greeting" id="greeting">
          <h1>Hello, Guest</h1>
          <p>Find something fun to play.</p>
        </div>
        
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search games...">
        </div>
      </header>

      <!-- Featured / Hero -->
      <section class="hero">
        <div class="hero-content">
          <span class="badge">Featured</span>
          <h2 id="hero-title">Loading...</h2>
          <p id="hero-desc">Please wait...</p>
          
          <div class="hero-actions">
            <button class="play-btn" id="playFeatured">Play Now</button>
            <button class="secondary-btn">Discover More</button>
          </div>
        </div>
      </section>

      <!-- Random Game Button - Under Featured -->
      <div class="random-section">
        <button class="quick-action-btn" id="randomBtn">Random Game</button>
      </div>

      <!-- Games Grid -->
      <section class="section">
        <div class="game-grid" id="gameGrid">
          <!-- Games populated by JS -->
        </div>
      </section>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar">
      <button class="signin-btn" id="signInBtn">Sign In</button>
      <button class="settings-btn" id="settingsBtn">Settings</button>
    </aside>
  </div>

  <script type="module" src="JS/main.js"></script>
</body>
</html>
